name: daily

on: [push, pull_request]

jobs:
  daily:
    timeout-minutes: 10
    name: RG Cron ${{ matrix.os }} ${{ matrix.ruby }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu  , ruby: head  }
          - { os: macos   , ruby: head  }
          - { os: windows , ruby: mingw }
          - { os: windows , ruby: mswin }
          
    steps:
      - uses: actions/checkout@v2
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: none

      - name: Setup
        shell: pwsh
        run:   |
          # update RubyGems in Ruby 2.2, bundle install
          if ('${{ matrix.ruby }}' -eq 'mswin') {
            gem install builder -N
          } else {
            rake setup
          }
        
      - name: Test rubygems
        run:  rake test
